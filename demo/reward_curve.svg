  <text x="20" y="96" fill="#94a3b8" font-size="14" font-family="Arial">reward</text>
  <polyline fill="none" stroke="#22d3ee" stroke-width="4"
    points="80,390 130,380 180,372 230,360 280,340 330,325 380,300 430,285 480,260 530,240 580,220 630,205 680,195 730,188 780,182 830,178 880,175"/>
