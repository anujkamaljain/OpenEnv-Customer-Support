  <line x1="80" y1="175" x2="900" y2="175" stroke="#334155" stroke-dasharray="6 6"/>
  <text x="84" y="167" fill="#94a3b8" font-size="12" font-family="Arial">~0.55+ trained plateau</text>
</svg>
