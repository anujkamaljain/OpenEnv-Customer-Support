<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#0f172a"/>
  <text x="40" y="48" fill="#e2e8f0" font-size="28" font-family="Arial">EICC Training Reward Curve (Illustrative)</text>
  <text x="40" y="78" fill="#94a3b8" font-size="16" font-family="Arial">Normalized reward improves as curriculum progresses</text>
  <line x1="80" y1="460" x2="900" y2="460" stroke="#64748b" stroke-width="2"/>
  <line x1="80" y1="460" x2="80" y2="100" stroke="#64748b" stroke-width="2"/>
